name: Hermes Main Canary

on:
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hermes-main-canary
  cancel-in-progress: true

jobs:
  compatibility:
    name: Hermes Agent main
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          enable-cache: true

      - name: Install development dependencies
        run: uv sync --frozen

      - name: Install Hermes main
        run: uv pip install "hermes-agent @ git+https://github.com/NousResearch/hermes-agent.git@main"

      - name: Run real Hermes integration test
        run: uv run pytest tests/test_hermes_integration.py -m integration --tb=short -q
