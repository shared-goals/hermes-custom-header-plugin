name: Hermes Main Canary

on:
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hermes-main-canary
  cancel-in-progress: true

jobs:
  compatibility:
    name: Hermes Agent main
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Install development dependencies
        run: uv sync --frozen

      - name: Install Hermes main
        run: uv pip install "hermes-agent @ git+https://github.com/NousResearch/hermes-agent.git@main"

      - name: Run real Hermes integration test
        run: uv run pytest tests/test_hermes_integration.py -m integration --tb=short -q
